name: CI/CD Pipeline

# Коли запускати pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # CI job на GitHub-hosted runner
  ci-build:
    runs-on: ubuntu-latest
    steps:
      # 1. Копіюємо код
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлюємо Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Встановлюємо залежності
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Перевірка стилю коду (flake8)
      - name: Run linter
        run: |
          pip install flake8
          flake8 . || true  # не падає на warnings

      # 5. Запуск тестів та генерація звіту
      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ --junitxml=report.xml

      # 6. Збір логів/графіків (якщо є)
      - name: Generate reports
        run: |
          mkdir -p logs
          echo "Логи та графіки тут" > logs/sample_log.txt
          mkdir -p graphs
          echo "Графік 1" > graphs/sample_graph.png

      # 7. Завантаження артефактів
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload graphs
        uses: actions/upload-artifact@v4
        with:
          name: graphs
          path: graphs/

  # CI job на self-hosted runner (локальний ПК/WSL)
  ci-selfhosted:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install flake8
          flake8 . || true

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ --junitxml=report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-selfhosted
          path: report.xml
