name: CI Pipeline

# Коли запускати конвеєр
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Виконується на хмарних раннерах GitHub

    steps:
      # 1. Копіюємо код репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлюємо Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Встановлюємо залежності
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Перевірка коду через flake8
      - name: Run linter
        run: |
          pip install flake8
          flake8 .

      # 5. Запуск тестів через pytest та генерація звіту
      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ --junitxml=report.xml

      # 6. Завантаження звіту як артефакту
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml
