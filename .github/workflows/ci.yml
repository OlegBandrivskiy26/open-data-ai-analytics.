name: CI Pipeline

# Коли запускати конвеєр
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Тут описуємо "ранери", де виконуватимуться дії
jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub-hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install flake8
          flake8 .

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ --junitxml=report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml
